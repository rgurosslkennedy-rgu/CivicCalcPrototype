cat << 'EOF' > index.html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civic Social Protection Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="control-panel" class="panel active">
        <h2 id="control-title">⚙️ Control Panel</h2>
        
        <fieldset>
            <legend id="legend-global">1. Global Localisation</legend>
            <div class="form-group">
                <label for="country-picker" id="lbl-territory">Target Territory</label>
                <select id="country-picker" onchange="initTerritory(this.value)">
                    <option value="ng">Nigeria</option>
                    <option value="zw">Zimbabwe</option>
                </select>
            </div>
            <div class="form-group" style="margin-top: 0.5rem;">
                <label for="lang-picker" id="lbl-language">System Language</label>
                <select id="lang-picker" onchange="changeLanguage(this.value)"></select>
            </div>
        </fieldset>

        <!-- Fixed form mount container wrapper -->
        <div id="secondary-form-flow" style="display: none;">
            <fieldset style="margin-top: 1rem;">
                <legend id="legend-demographics">2. Demographic Attributes</legend>
                <div class="form-group">
                    <label for="region-picker" id="lbl-region">State / Province Region</label>
                    <select id="region-picker"></select>
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label for="age-field" id="lbl-age">User Age (Years)</label>
                    <input type="number" id="age-field" value="30" min="0" max="120">
                </div>
                <div id="children-wrapper" class="form-group" style="margin-top: 0.5rem;">
                    <label for="children-field">Number of Dependent Children</label>
                    <input type="number" id="children-field" value="0" min="0">
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label for="employment-status" id="lbl-employment">Employment Track</label>
                    <select id="employment-status" onchange="toggleEmploymentFields(this.value)">
                        <option value="formal">Formal Sector Worker</option>
                        <option value="informal">Informal Trader / Self-Employed</option>
                        <option value="unemployed">Unemployed</option>
                    </select>
                </div>
            </fieldset>

            <fieldset id="financial-fieldset" style="margin-top: 1rem;">
                <legend id="legend-contribution">3. Financial Parameters</legend>
                <div class="form-group">
                    <label for="start-year">Timeline Historical Start Year</label>
                    <select id="start-year" onchange="regenerateYearInputs()">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label id="income-label" for="salary-field">Current Salary Base Amount</label>
                    <input type="number" id="salary-field" value="0" min="0">
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label for="income-period">Salary Inflow Tracking Period</label>
                    <select id="income-period">
                        <option value="monthly">Monthly Amount</option>
                        <option value="yearly">Yearly Aggregate</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 0.5rem;">
                    <label id="years-label" for="years-field">Years of Contribution</label>
                    <input type="number" id="years-field" value="3" min="1" max="40" onchange="regenerateYearInputs()">
                </div>
                <div class="form-group" style="margin-top: 0.5rem;" id="strategy-wrapper-node">
                    <label for="calc-strategy" id="lbl-strategy">Calculation Strategy</label>
                    <select id="calc-strategy" onchange="toggleStrategyFields(this.value)">
                        <option value="baseline">Use this income as my baseline estimation</option>
                        <option value="granular">Custom inflation parameters year-by-year</option>
                    </select>
                </div>
                <div id="granular-inputs" style="display: none; margin-top: 0.5rem;">
                    <label style="color: #0d6efd; margin-bottom: 0.3rem; display: block;">Provide Expected/Historical Inflation Rates (%)</label>
                    <div id="dynamic-year-rows-container"></div>
                </div>
                <div id="usd-toggle-wrapper" class="form-group-row" style="margin-top: 0.5rem;">
                    <input type="checkbox" id="convert-usd-checkbox" style="width: auto;">
                    <label for="convert-usd-checkbox" id="lbl-usd" style="font-weight: normal; margin-left: 0.5rem;">Convert Final Outputs to USD ($)</label>
                </div>
            </fieldset>

            <button class="run-btn" id="btn-run" onclick="executeCivicEngine()">Run Engine</button>
        </div>
    </div>

    <div id="output-panel" class="panel">
        <header>
            <h1 id="main-title">Civic Social Protection Engine</h1>
            <p id="main-subtitle"></p>
        </header>
        <section>
            <h2>Analysis Summary</h2>
            <div class="output-card" id="output-box"></div>
        </section>
        <section style="margin-top: 2rem;">
            <h2 id="resources-title">Matched Demographic Resources</h2>
            <div id="resource-box-container" class="resource-grid"></div>
        </section>
        <button class="back-btn" id="btn-back" onclick="setView('control')">← Back to Setup Profile</button>
    </div>

    <script src="languages.js"></script>
    <script src="script.js"></script>
</body>
</html>
EOF
